name: CI

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

  
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore packages
        run: dotnet restore EmployeeDirectory.sln

      - name: Build
        run: dotnet build EmployeeDirectory.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test EmployeeDirectory.sln --configuration Release --no-build --verbosity normal
